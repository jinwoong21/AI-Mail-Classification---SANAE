{% extends "base.html" %}

{% block body_class %}auth-page{% endblock %}

{% block content %}


<div class="auth-wrapper">
    <div class="auth-card">

        <h2 class="auth-title">SANAE 로그인</h2>
        <p class="auth-subtitle">
            AI 메일 자동 분류 시스템에 접속하세요
        </p>

        <form method="post" action="{{ url_for('login') }}">

            {% if error %}
            <div class="auth-error">
                {{ error }}
            </div>
                {% endif %}

            <div class="form-row">
                <label for="login-email">이메일</label>
                <input type="email"
                       id="login-email"
                       name="email"
                       placeholder="name@sanae.com"
                       required>
            </div>

            <div class="form-row">
                <label for="login-password">비밀번호</label>
                <input type="password"
                       id="login-password"
                       name="password"
                       placeholder="비밀번호를 입력하세요"
                       required>
            </div>

            <div class="auth-row-between">
                <label class="checkbox-inline">
                    <input type="checkbox" name="remember">
                    로그인 상태 유지
                </label>
                <a href="#" class="auth-link-sm">비밀번호 찾기</a>
            </div>

            <button type="submit" class="auth-submit">
                로그인
            </button>

        </form>

        <div class="auth-footer">
            아직 계정이 없으신가요?
            <a href="{{ url_for('register') }}">회원가입</a>
        </div>

    </div>
</div>

<!--- 디자인 ---->
<style>
/* ===============================
   SANAE Login Page (Scoped Style)
   =============================== */

.auth-wrapper {
    min-height: calc(100vh - 60px);
    display: flex;
    justify-content: center;
    align-items: center;
    background: #F8F9FA;
}

.auth-card {
    width: 420px;
    background: #FFFFFF;
    border-radius: 14px;
    padding: 40px 36px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    border: 1px solid #E5E7EB;
}

.auth-title {
    font-size: 24px;
    font-weight: 800;
    text-align: center;
    color: #111827;
    margin-bottom: 8px;
}

.auth-subtitle {
    font-size: 14px;
    text-align: center;
    color: #6B7280;
    margin-bottom: 32px;
}

.form-row {
    margin-bottom: 18px;
}

.form-row label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 6px;
}

.form-row input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid #D1D5DB;
    font-size: 14px;
}

.form-row input:focus {
    outline: none;
    border-color: #2563EB;
    box-shadow: 0 0 0 2px rgba(37,99,235,0.15);
}

.auth-row-between {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: #6B7280;
    margin: 10px 0 26px;
}

.checkbox-inline {
    display: flex;
    align-items: center;
    gap: 6px;
}

.auth-link-sm {
    color: #2563EB;
    text-decoration: none;
    font-weight: 500;
}

.auth-link-sm:hover {
    text-decoration: underline;
}

.auth-submit {
    width: 100%;
    padding: 13px;
    background: #2563EB;
    color: #FFFFFF;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
}

.auth-submit:hover {
    background: #1E40AF;
}

.auth-footer {
    margin-top: 26px;
    text-align: center;
    font-size: 14px;
    color: #6B7280;
}

.auth-footer a {
    color: #2563EB;
    font-weight: 600;
    margin-left: 4px;
    text-decoration: none;
}

    .auth-error {
    margin-bottom: 16px;
    padding: 10px 12px;
    background: #FEE2E2;
    color: #991B1B;
    border-radius: 6px;
    font-size: 13px;
    text-align: center;
}
</style>

{% endblock %}
