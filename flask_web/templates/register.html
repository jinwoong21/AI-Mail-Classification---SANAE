{% extends "base.html" %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">

        <h2 class="auth-title">회원가입</h2>
        <p class="auth-subtitle">
            SANAE AI 메일 자동분류 시스템 회원가입
        </p>

        <form method="post" action="{{ url_for('register') }}">

            <!-- 로그인 정보 -->
            <div class="page-section">
                <h4 class="section-title">로그인 정보</h4>

                <div class="form-row">
                    <label for="email">이메일</label>
                    <input type="email"
                           id="email"
                           name="email"
                           placeholder="name@example.com"
                           required>
                </div>

                <div class="form-row">
                    <label for="password">비밀번호</label>
                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="비밀번호를 입력하세요"
                           required>
                </div>

                <div class="form-row">
                    <label for="password_confirm">비밀번호 확인</label>
                    <input type="password"
                           id="password_confirm"
                           name="password_confirm"
                           placeholder="비밀번호를 다시 입력하세요"
                           required>
                </div>

                <div class="form-row">
                    <label for="name">이름</label>
                    <input type="text"
                           id="name"
                           name="name"
                           placeholder="성함을 입력하세요"
                           required>
                </div>
            </div>

            <!-- 회원 유형 -->
            <div class="page-section">
                <h4 class="section-title">회원 정보</h4>

                <div class="form-row">
                    <label>회원 유형</label>

                    <div class="member-type-toggle">
                        <label class="toggle-btn">
                            <input type="radio" name="member_type" value="PERSONAL" checked>
                            <span>개인</span>
                        </label>

                        <label class="toggle-btn">
                            <input type="radio" name="member_type" value="COMPANY">
                            <span>기업</span>
                        </label>
                    </div>
                </div>
            </div>

            <button type="submit" class="mygabia-btn auth-submit">
                회원가입
            </button>
        </form>

        <div class="auth-footer">
            이미 계정이 있으신가요?
            <a href="{{ url_for('login') }}">로그인</a>
        </div>

    </div>
</div>

<style>
/* 공통 auth 페이지 배경 */
body.auth-page {
    background: #F4F6FA;
    min-height: 100vh;
}

/* 중앙 정렬 래퍼 */
.auth-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 80px);
}

/* 카드 */
.auth-card {
    width: 420px;
    background: #ffffff;
    border-radius: 12px;
    padding: 40px 36px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
}

/* 타이틀 */
.auth-title {
    font-size: 22px;
    font-weight: 700;
    color: #111827;
    text-align: center;
    margin-bottom: 8px;
}

.auth-subtitle {
    font-size: 14px;
    color: #6B7280;
    text-align: center;
    margin-bottom: 28px;
}

/* 섹션 */
.page-section {
    margin-bottom: 24px;
}

.section-title {
    font-size: 14px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 12px;
}

/* 입력 */
.form-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
}

.form-row label {
    font-size: 13px;
    font-weight: 500;
    color: #374151;
}

.form-row input {
    height: 42px;
    padding: 0 12px;
    border: 1px solid #D1D5DB;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
}

.form-row input:focus {
    border-color: #2563EB;
    box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
}

/* 회원유형 토글 */
.member-type-toggle {
    display: flex;
    gap: 10px;
}

.toggle-btn {
    flex: 1;
    border: 1px solid #D1D5DB;
    border-radius: 8px;
    text-align: center;
    cursor: pointer;
}

.toggle-btn input {
    display: none;
}

.toggle-btn span {
    display: block;
    padding: 10px 0;
    font-size: 14px;
    font-weight: 500;
    color: #374151;
}

.toggle-btn input:checked + span {
    background: #2563EB;
    color: #ffffff;
    border-radius: 8px;
}

/* 제출 버튼 */
.auth-submit {
    width: 100%;
    height: 44px;
    margin-top: 8px;
    background: #2563EB;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
}

.auth-submit:hover {
    background: #1E40AF;
}

/* 하단 링크 */
.auth-footer {
    text-align: center;
    font-size: 13px;
    color: #6B7280;
    margin-top: 20px;
}

.auth-footer a {
    color: #2563EB;
    font-weight: 600;
    text-decoration: none;
}
</style>

{% endblock %}
